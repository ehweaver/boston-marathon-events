name: Update Events

on:
  schedule:
    # Runs daily at 2:00 AM Eastern (7:00 AM UTC)
    - cron: '0 7 * * *'
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated events.json
        run: |
          git config user.name "events-bot"
          git config user.email "bot@bostonmarathonevents.com"
          git add data/events.json logs/scraper.log
          git diff --staged --quiet || git commit -m "chore: auto-update events [$(date '+%Y-%m-%d')]"
          git push
